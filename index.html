<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像分割ツール</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #333;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
        }

        .upload-area:hover {
            border-color: #4CAF50;
            background: #f9fff9;
        }

        .upload-area.dragover {
            border-color: #4CAF50;
            background: #e8f5e9;
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .upload-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #999;
            font-size: 12px;
        }

        .preview-section {
            display: none;
            margin-bottom: 30px;
        }

        .preview-section.active {
            display: block;
        }

        .image-info {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #333;
        }

        .tiles-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .tile {
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
            background: #f9f9f9;
            position: relative;
        }

        .tile img {
            width: 100%;
            height: auto;
            display: block;
        }

        .tile-info {
            padding: 10px;
            font-size: 12px;
            color: #666;
            text-align: center;
            border-top: 1px solid #ddd;
        }

        .download-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 8px;
            width: 100%;
            transition: background 0.2s;
        }

        .download-btn:hover {
            background: #45a049;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }

        button.btn {
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        button.btn-primary {
            background: #4CAF50;
            color: white;
        }

        button.btn-primary:hover {
            background: #45a049;
        }

        button.btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        button.btn-secondary:hover {
            background: #e0e0e0;
        }

        .format-selector {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .format-selector label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .format-selector input[type="radio"] {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>画像分割ツール</h1>
        <p class="subtitle">幅900px × 縦2000pxで自動分割します</p>

        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept="image/*">
            <div class="upload-text">画像をここにドラッグ＆ドロップ</div>
            <div class="upload-hint">またはクリックして選択</div>
        </div>

        <div class="preview-section" id="previewSection">
            <div class="image-info" id="imageInfo"></div>

            <div class="format-selector">
                <label>
                    <input type="radio" name="format" value="png" checked> PNG
                </label>
                <label>
                    <input type="radio" name="format" value="jpeg"> JPEG
                </label>
            </div>

            <div class="tiles-container" id="tilesContainer"></div>

            <div class="action-buttons">
                <button class="btn btn-primary" id="downloadAllBtn">すべてダウンロード</button>
                <button class="btn btn-secondary" id="resetBtn">リセット</button>
            </div>
        </div>
    </div>

    <script>
        const TILE_WIDTH = 900;
        const TILE_HEIGHT = 2000;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewSection = document.getElementById('previewSection');
        const imageInfo = document.getElementById('imageInfo');
        const tilesContainer = document.getElementById('tilesContainer');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const resetBtn = document.getElementById('resetBtn');

        let originalImage = null;
        let tiles = [];

        // ドラッグ&ドロップ
        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                processFile(file);
            }
        });

        // ファイル選択
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                processFile(file);
            }
        });

        function processFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    splitImage();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function splitImage() {
            const imgWidth = originalImage.naturalWidth;
            const imgHeight = originalImage.naturalHeight;

            // タイル数を計算
            const tilesNeeded = Math.ceil(imgHeight / TILE_HEIGHT);

            tiles = [];

            for (let i = 0; i < tilesNeeded; i++) {
                const y = i * TILE_HEIGHT;
                const tileHeight = Math.min(TILE_HEIGHT, imgHeight - y);
                const canvasWidth = Math.min(TILE_WIDTH, imgWidth);

                // 各タイル用のCanvasを作成
                const tileCanvas = document.createElement('canvas');
                tileCanvas.width = canvasWidth;
                tileCanvas.height = tileHeight;

                const ctx = tileCanvas.getContext('2d');

                // 元の画像からタイル部分を描画（幅900を超えた場合は縮小）
                ctx.drawImage(
                    originalImage,
                    0, y,
                    imgWidth, tileHeight,
                    0, 0,
                    canvasWidth, tileHeight
                );

                tiles.push({
                    index: i,
                    canvas: tileCanvas
                });
            }

            displayPreview(imgWidth, imgHeight, tilesNeeded);
        }

        function displayPreview(imgWidth, imgHeight, tilesNeeded) {
            imageInfo.innerHTML = `
                元の画像：${imgWidth}×${imgHeight}px<br>
                分割数：${tilesNeeded}個のタイル
            `;

            tilesContainer.innerHTML = '';

            tiles.forEach((tile, index) => {
                const tileDiv = document.createElement('div');
                tileDiv.className = 'tile';

                const img = document.createElement('img');
                img.src = tile.canvas.toDataURL();

                const info = document.createElement('div');
                info.className = 'tile-info';
                info.textContent = `タイル ${index + 1}`;

                const btn = document.createElement('button');
                btn.className = 'download-btn';
                btn.textContent = 'ダウンロード';
                btn.addEventListener('click', () => downloadTile(index));

                tileDiv.appendChild(img);
                tileDiv.appendChild(info);
                tileDiv.appendChild(btn);

                tilesContainer.appendChild(tileDiv);
            });

            previewSection.classList.add('active');
        }

        function getFormat() {
            return document.querySelector('input[name="format"]:checked').value;
        }

        function downloadTile(index) {
            const format = getFormat();
            const canvas = tiles[index].canvas;
            const mimeType = format === 'png' ? 'image/png' : 'image/jpeg';
            const extension = format === 'png' ? 'png' : 'jpg';

            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `tile_${index + 1}.${extension}`;
                a.click();
                URL.revokeObjectURL(url);
            }, mimeType, format === 'jpeg' ? 0.95 : undefined);
        }

        downloadAllBtn.addEventListener('click', () => {
            tiles.forEach((_, index) => {
                setTimeout(() => {
                    downloadTile(index);
                }, index * 300);
            });
        });

        resetBtn.addEventListener('click', () => {
            fileInput.value = '';
            previewSection.classList.remove('active');
            tilesContainer.innerHTML = '';
            tiles = [];
            originalImage = null;
        });
    </script>
</body>
</html>
