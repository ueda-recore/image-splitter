<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像自動分割ツール</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>画像自動分割ツール</h1>
        <p class="description">縦長の画像を2000×900pxで自動分割します</p>

        <div class="upload-area">
            <input type="file" id="imageInput" accept="image/*" />
            <label for="imageInput" class="upload-label">
                <div class="upload-icon">📤</div>
                <p>クリックして画像を選択またはドラッグ&ドロップ</p>
            </label>
        </div>

        <div id="preview" class="preview-section" style="display: none;">
            <h2>元画像</h2>
            <img id="previewImage" alt="preview" />
            <p id="imageDimensions"></p>
        </div>

        <div id="results" class="results-section" style="display: none;">
            <h2>分割結果</h2>
            <div id="splitImages" class="split-images-grid"></div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            処理中...
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
